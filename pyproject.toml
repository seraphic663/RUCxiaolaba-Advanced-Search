[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
markers = [
    "live: requires network access and a valid mini-program cookie",
    "performance: manual benchmark, excluded from normal correctness checks",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["data", "temp"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
