<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUC小喇叭 搜索</title>
<script>
(function() {
  var theme = localStorage.getItem('rucxlb-theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; min-height: 100vh; }
.header { background: #8b0012; color: #fff; padding: 20px 16px; text-align: center; position: relative; }
.header h1 { font-size: 1.5em; }
.header p { opacity: 0.8; margin-top: 4px; font-size: 0.85em; }
.header .github-link { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.78); text-decoration: none; font-size: 0.9em; font-weight: 500; }
.header .github-link:hover { color: #fff; }
.header .github-link svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
.header .admin-link { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.85em; }
.header .admin-link:hover { color: #fff; }
.header-actions { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px; }
.header-actions .admin-link { position: static; transform: none; }
.theme-toggle { width: 32px; height: 32px; border: 1px solid rgba(255,255,255,.28); border-radius: 50%; background: transparent; color: rgba(255,255,255,.82); cursor: pointer; font-size: 18px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
.theme-toggle:hover { color: #fff; border-color: rgba(255,255,255,.65); }
/* Search */
.search-wrap { max-width: 760px; margin: 14px auto 10px; padding: 0 16px; }
.search-wrap input { width: 100%; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 12px; outline: none; transition: border-color .2s; }
.search-wrap input:focus { border-color: #8b0012; }

/* Sort bar */
.sort-bar { max-width: 760px; margin: 0 auto 8px; padding: 0 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sort-bar button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: 0.85em; color: #666; transition: all .2s; }
.sort-bar button:hover { border-color: #8b0012; color: #8b0012; }
.sort-bar button.active { background: #8b0012; color: #fff; border-color: #8b0012; }
.sort-bar .count-text { margin-left: auto; color: #999; font-size: 0.8em; }

/* Results */
.results { max-width: 760px; margin: 0 auto; padding: 0 16px; }

/* Post card */
.post { background: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: box-shadow .2s; }
.post:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.post .post-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 2px; }
.post .post-header .left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.post .post-cat { background: #fff0f0; color: #8b0012; padding: 2px 8px; border-radius: 4px; font-size: 0.78em; white-space: nowrap; }
.post .post-user { color: #333; font-size: 0.9em; font-weight: 500; }
.post .post-time-right { color: #bbb; font-size: 0.78em; white-space: nowrap; flex-shrink: 0; }
.post .post-id { color: #bbb; font-size: 0.78em; white-space: nowrap; }

/* Content */
.post .post-content { line-height: 1.75; color: #222; word-break: break-word; position: relative; }
.post .post-content.collapsed { max-height: 4.9em; overflow: hidden; }
.post .post-content.collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2.2em; background: linear-gradient(transparent, #fff); pointer-events: none; z-index: 0; }
.post .expand-bar { margin-top: 4px; }
.post .expand-btn { color: #8b0012; cursor: pointer; font-size: 0.85em; user-select: none; display: inline-block; padding: 2px 0; }
.post .expand-btn:hover { text-decoration: underline; }

/* Bottom row: stats + comment toggle on same line */
.post-bottom-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
.post-stats-inline { display: flex; gap: 12px; font-size: 0.82em; color: #999; }
.post-stats-inline span { cursor: default; }
.comment-toggle-inline { color: #8b0012; cursor: pointer; font-size: 0.85em; user-select: none; white-space: nowrap; }
.comment-toggle-inline:hover { text-decoration: underline; }

/* Comments */
.post .comments-wrap { margin-top: 8px; border-left: 2px solid #eee; padding-left: 12px; }
.cmt { padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.87em; }
.cmt:last-child { border-bottom: none; }
.cmt .cmt-meta { color: #999; font-size: 0.82em; margin-bottom: 3px; }
.cmt .cmt-meta .op-tag { color: #8b0012; font-size: 0.85em; }
.cmt .cmt-text { color: #444; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.cmt .replies { margin-left: 10px; border-left: 1px solid #eee; padding-left: 10px; margin-top: 4px; }
.cmt .reply { padding: 4px 0; font-size: 0.95em; }
.loading { text-align: center; color: #999; padding: 20px; font-size: 0.9em; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #8b0012; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Pagination */
.pagination { max-width: 760px; margin: 20px auto; padding: 0 16px; display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
.pagination button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.9em; color: #333; transition: all .2s; }
.pagination button:hover:not(:disabled) { border-color: #8b0012; color: #8b0012; }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination .page-info { color: #666; font-size: 0.9em; margin: 0 4px; }
.pagination .page-input { width: 50px; padding: 7px 4px; text-align: center; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9em; outline: none; }
.pagination .page-input:focus { border-color: #8b0012; }
.pagination .total-pages { color: #999; font-size: 0.85em; }

/* Filter bar */
.filter-bar { max-width: 760px; margin: 0 auto 12px; padding: 0 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filter-bar label { font-size: 0.8em; color: #888; white-space: nowrap; }
.filter-bar select,
.filter-bar input { padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 0.82em; color: #333; outline: none; }
.filter-bar select { cursor: pointer; }
.filter-bar input { width: 150px; }
.filter-bar select:focus,
.filter-bar input:focus { border-color: #8b0012; }

/* Empty state */
.empty { text-align: center; color: #999; padding: 60px 20px; }
.empty .icon { font-size: 3em; margin-bottom: 12px; }
.empty .text { font-size: 1em; }

/* Info */
.info { color: #bbb; text-align: center; margin: 30px 0 40px; font-size: 0.8em; }
.info a { color: #8b0012; text-decoration: none; }
.info a:hover { text-decoration: underline; }

/* ── AI Panel (top bar) ── */
.ai-section { max-width: 760px; margin: 0 auto; padding: 0 16px 6px; }
.ai-bar { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 8px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.ai-bar-icon { font-size: 1.1em; }
.ai-bar-label { font-weight: 600; font-size: 0.9em; color: #8b0012; white-space: nowrap; }
.ai-bar-hint { color: #bbb; font-size: 0.78em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ai-bar-invite, .ai-bar-query { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
.ai-bar-invite input { width: 90px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.82em; outline: none; }
.ai-bar-invite input:focus { border-color: #8b0012; }
.ai-bar-invite button { padding: 4px 12px; border: none; border-radius: 6px; background: #8b0012; color: #fff; font-size: 0.82em; cursor: pointer; white-space: nowrap; }
.ai-bar-invite button:hover { background: #6d000e; }
.ai-bar-query input { width: 200px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.82em; outline: none; font-family: inherit; }
.ai-bar-query input:focus { border-color: #8b0012; }
.ai-bar-query button { padding: 4px 12px; border: none; border-radius: 6px; background: #8b0012; color: #fff; font-size: 0.82em; cursor: pointer; white-space: nowrap; }
.ai-bar-query button:disabled { background: #ccc; cursor: not-allowed; }
.ai-bar-status { font-size: 0.75em; color: #bbb; margin-left: 4px; white-space: nowrap; }

/* result dropdown */
.ai-result { max-width: 760px; margin: 6px auto 0; padding: 0 16px; }
.ai-result > .ai-answer-card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.08); border: 1px solid #eee; margin-bottom: 10px; }
.ai-summary { line-height: 1.75; color: #222; white-space: pre-wrap; word-break: break-word; }
.ai-overview { line-height: 1.75; color: #222; margin-bottom: 10px; }
.ai-findings { margin: 0; padding-left: 20px; }
.ai-findings li { margin: 8px 0; line-height: 1.65; }
.ai-findings strong { color: #8b0012; }
.ai-caveat { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; color: #777; font-size: 0.86em; line-height: 1.6; }
.ai-evidence-summary { color: #777; font-size: 0.82em; margin: 8px 0; line-height: 1.5; }
.ai-evidence-title { color: #8b0012; font-weight: 600; font-size: 0.9em; margin: 12px 0 8px; }
.ai-match-info { color: #777; font-size: 0.78em; margin: 5px 0; }
.ai-comment-reference { background: #fafafa; border-left: 3px solid #e4c3c7; padding: 7px 10px; margin: 6px 0; color: #555; font-size: 0.84em; line-height: 1.55; }
.ai-comment-reference .meta { color: #999; font-size: 0.9em; margin-bottom: 2px; }
.ai-cited { margin-top: 8px; font-size: 0.85em; color: #8b0012; }
.ai-cited a { color: #8b0012; text-decoration: none; cursor: pointer; }
.ai-cited a:hover { text-decoration: underline; }
.ai-error { color: #e94560; }
.ai-spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: ai-spin .5s linear infinite; vertical-align: middle; margin-right: 3px; }
@keyframes ai-spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .ai-bar { flex-wrap: wrap; gap: 4px; }
  .ai-bar-hint { display: none; }
  .ai-bar-invite, .ai-bar-query { margin-left: 0; width: 100%; }
  .ai-bar-query input { flex: 1; width: auto; }
}

/* Mobile */
@media (max-width: 600px) {
  .header { padding: 14px 12px; }
  .header h1 { font-size: 1.2em; }
  .header p { font-size: 0.75em; }
  .header .github-link { position: static; justify-content: center; margin-bottom: 6px; transform: none; }
  .header-actions { position: static; transform: none; justify-content: center; margin-top: 6px; }
  .header .admin-link { position: static; display: block; margin-top: 0; transform: none; }
  .search-wrap { margin: 10px auto; }
  .search-wrap input { padding: 10px 14px; font-size: 15px; }
  .sort-bar { gap: 4px; }
  .sort-bar button { padding: 5px 10px; font-size: 0.78em; }
  .post { padding: 12px 14px; }
  .post .post-content.collapsed { max-height: 4.5em; }
  .pagination { gap: 4px; }
  .pagination button { padding: 7px 12px; font-size: 0.82em; }
}

html[data-theme="light"] body { background: #f4f1e8; color: #2f2d29; }
html[data-theme="light"] .search-wrap input,
html[data-theme="light"] .filter-bar input,
html[data-theme="light"] .filter-bar select,
html[data-theme="light"] .pagination .page-input,
html[data-theme="light"] .ai-bar-invite input,
html[data-theme="light"] .ai-bar-query input { background: #fffdf8; border-color: #d9d3c7; color: #2f2d29; }
html[data-theme="light"] .sort-bar button,
html[data-theme="light"] .pagination button { background: #fffdf8; border-color: #d9d3c7; }
html[data-theme="light"] .post,
html[data-theme="light"] .ai-bar,
html[data-theme="light"] .ai-result > .ai-answer-card { background: #fffdf8; border-color: #e1dbcf; }
html[data-theme="light"] .post .post-content.collapsed::after { background: linear-gradient(transparent, #fffdf8); }
html[data-theme="light"] .post-bottom-row,
html[data-theme="light"] .cmt,
html[data-theme="light"] .ai-caveat { border-color: #e8e2d7; }
html[data-theme="light"] .post .comments-wrap,
html[data-theme="light"] .cmt .replies { border-color: #ded8cc; }
html[data-theme="light"] .ai-comment-reference { background: #f7f3ea; }

html[data-theme="dark"] { color-scheme: dark; }
html[data-theme="dark"] body { background: #111315; color: #e8e8e8; }
html[data-theme="dark"] .header { background: #65000d; }
html[data-theme="dark"] .search-wrap input,
html[data-theme="dark"] .filter-bar input,
html[data-theme="dark"] .filter-bar select,
html[data-theme="dark"] .pagination .page-input,
html[data-theme="dark"] .ai-bar-invite input,
html[data-theme="dark"] .ai-bar-query input { background: #1b1f23; border-color: #3b4249; color: #ededed; }
html[data-theme="dark"] .search-wrap input::placeholder,
html[data-theme="dark"] input::placeholder { color: #8d949b; }
html[data-theme="dark"] .sort-bar button,
html[data-theme="dark"] .pagination button { background: #1b1f23; border-color: #3b4249; color: #c8cdd2; }
html[data-theme="dark"] .sort-bar button.active { background: #9d1c2d; border-color: #9d1c2d; color: #fff; }
html[data-theme="dark"] .post,
html[data-theme="dark"] .ai-bar,
html[data-theme="dark"] .ai-result > .ai-answer-card { background: #1a1d20; border-color: #30363c; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
html[data-theme="dark"] .post:hover { box-shadow: 0 2px 10px rgba(0,0,0,.45); }
html[data-theme="dark"] .post .post-cat { background: #3a1c21; color: #f0a5af; }
html[data-theme="dark"] .post .post-user,
html[data-theme="dark"] .post .post-content,
html[data-theme="dark"] .ai-summary,
html[data-theme="dark"] .ai-overview { color: #e8e8e8; }
html[data-theme="dark"] .post .post-time-right,
html[data-theme="dark"] .post .post-id,
html[data-theme="dark"] .sort-bar .count-text,
html[data-theme="dark"] .post-stats-inline,
html[data-theme="dark"] .cmt .cmt-meta,
html[data-theme="dark"] .pagination .total-pages { color: #929aa2; }
html[data-theme="dark"] .post .post-content.collapsed::after { background: linear-gradient(transparent, #1a1d20); }
html[data-theme="dark"] .post-bottom-row,
html[data-theme="dark"] .cmt,
html[data-theme="dark"] .ai-caveat { border-color: #30363c; }
html[data-theme="dark"] .post .comments-wrap,
html[data-theme="dark"] .cmt .replies { border-color: #3b4249; }
html[data-theme="dark"] .cmt .cmt-text { color: #cdd2d7; }
html[data-theme="dark"] .pagination .page-info,
html[data-theme="dark"] .filter-bar label,
html[data-theme="dark"] .ai-caveat,
html[data-theme="dark"] .ai-evidence-summary,
html[data-theme="dark"] .ai-match-info { color: #a0a7ae; }
html[data-theme="dark"] .ai-comment-reference { background: #202429; border-color: #7f3540; color: #cdd2d7; }
html[data-theme="dark"] mark { background: #6d5413; color: #fff2bd; }
html[data-theme="dark"] .spinner { border-color: #3b4249; border-top-color: #d66b79; }

html[data-theme="light"] {
  --ui-bg: #f7f5ee;
  --ui-surface: #fffdf7;
  --ui-surface-2: #f1eee5;
  --ui-border: #ddd7ca;
  --ui-text: #2d2b27;
  --ui-muted: #7b766d;
  --ui-accent: #c15f3c;
  --ui-accent-hover: #a84f32;
  --ui-accent-soft: #f3e2d8;
  --ui-shadow: rgba(71, 58, 43, .08);
}
html[data-theme="dark"] {
  --ui-bg: #1f1e1b;
  --ui-surface: #292824;
  --ui-surface-2: #32312c;
  --ui-border: #45423b;
  --ui-text: #eee9df;
  --ui-muted: #aaa398;
  --ui-accent: #d97757;
  --ui-accent-hover: #e58a6c;
  --ui-accent-soft: #493028;
  --ui-shadow: rgba(0, 0, 0, .28);
}
html[data-theme] body { background: var(--ui-bg); color: var(--ui-text); font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
html[data-theme] .header { background: var(--ui-surface-2); color: var(--ui-text); border-bottom: 1px solid var(--ui-border); box-shadow: inset 0 3px 0 var(--ui-accent); }
html[data-theme] .header h1 { color: var(--ui-text); font-family: Georgia, "Songti SC", "STSong", serif; font-weight: 600; }
html[data-theme] .header p,
html[data-theme] .header .github-link,
html[data-theme] .header .admin-link { color: var(--ui-muted); }
html[data-theme] .header .github-link:hover,
html[data-theme] .header .admin-link:hover { color: var(--ui-accent); }
html[data-theme] .theme-toggle { border-color: var(--ui-border); color: var(--ui-muted); background: var(--ui-surface); }
html[data-theme] .theme-toggle:hover { border-color: var(--ui-accent); color: var(--ui-accent); }
html[data-theme] .search-wrap input,
html[data-theme] .filter-bar input,
html[data-theme] .filter-bar select,
html[data-theme] .pagination .page-input,
html[data-theme] .ai-bar-invite input,
html[data-theme] .ai-bar-query input { background: var(--ui-surface); border-color: var(--ui-border); color: var(--ui-text); }
html[data-theme] input::placeholder { color: var(--ui-muted); }
html[data-theme] .search-wrap input:focus,
html[data-theme] .filter-bar input:focus,
html[data-theme] .filter-bar select:focus,
html[data-theme] .pagination .page-input:focus,
html[data-theme] .ai-bar-invite input:focus,
html[data-theme] .ai-bar-query input:focus { border-color: var(--ui-accent); }
html[data-theme] .sort-bar button,
html[data-theme] .pagination button { background: var(--ui-surface); border-color: var(--ui-border); color: var(--ui-muted); border-radius: 8px; }
html[data-theme] .sort-bar button:hover,
html[data-theme] .pagination button:hover:not(:disabled) { border-color: var(--ui-accent); color: var(--ui-accent); }
html[data-theme] .sort-bar button.active,
html[data-theme] .ai-bar-invite button,
html[data-theme] .ai-bar-query button { background: var(--ui-accent); border-color: var(--ui-accent); color: #fff; }
html[data-theme] .ai-bar-invite button:hover { background: var(--ui-accent-hover); }
html[data-theme] .post,
html[data-theme] .ai-bar,
html[data-theme] .ai-result > .ai-answer-card { background: var(--ui-surface); border-color: var(--ui-border); border-radius: 8px; box-shadow: 0 1px 4px var(--ui-shadow); }
html[data-theme] .post .post-cat { background: var(--ui-accent-soft); color: var(--ui-accent); }
html[data-theme] .post .post-user,
html[data-theme] .post .post-content,
html[data-theme] .ai-summary,
html[data-theme] .ai-overview,
html[data-theme] .cmt .cmt-text { color: var(--ui-text); }
html[data-theme] .post .post-content.collapsed::after { background: linear-gradient(transparent, var(--ui-surface)); }
html[data-theme] .post .post-time-right,
html[data-theme] .post .post-id,
html[data-theme] .sort-bar .count-text,
html[data-theme] .post-stats-inline,
html[data-theme] .cmt .cmt-meta,
html[data-theme] .pagination .page-info,
html[data-theme] .pagination .total-pages,
html[data-theme] .filter-bar label,
html[data-theme] .ai-bar-hint,
html[data-theme] .ai-bar-status,
html[data-theme] .ai-caveat,
html[data-theme] .ai-evidence-summary,
html[data-theme] .ai-match-info { color: var(--ui-muted); }
html[data-theme] .post .expand-btn,
html[data-theme] .comment-toggle-inline,
html[data-theme] .ai-bar-label,
html[data-theme] .ai-findings strong,
html[data-theme] .ai-evidence-title,
html[data-theme] .ai-cited,
html[data-theme] .ai-cited a,
html[data-theme] .info a { color: var(--ui-accent); }
html[data-theme] .post-bottom-row,
html[data-theme] .cmt,
html[data-theme] .ai-caveat { border-color: var(--ui-border); }
html[data-theme] .post .comments-wrap,
html[data-theme] .cmt .replies { border-color: var(--ui-border); }
html[data-theme] .ai-comment-reference { background: var(--ui-surface-2); border-color: var(--ui-accent); color: var(--ui-text); }
html[data-theme] mark { background: color-mix(in srgb, var(--ui-accent) 28%, var(--ui-surface)); color: var(--ui-text); }
html[data-theme] .spinner { border-color: var(--ui-border); border-top-color: var(--ui-accent); }
</style>
</head>
<body>

<script>
function updateThemeButton() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.querySelectorAll('.theme-icon').forEach(function(icon) {
    icon.textContent = dark ? '☀' : '☾';
  });
  document.querySelectorAll('.theme-toggle').forEach(function(button) {
    var label = dark ? '切换浅色模式' : '切换深色模式';
    button.setAttribute('aria-label', label);
    button.setAttribute('title', label);
  });
}

function toggleTheme() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('rucxlb-theme', next);
  updateThemeButton();
}

// ===== State =====
let currentPage = 1;
let currentSort = 'time';
let currentQuery = '';
let totalPages = 1;
let paginationMode = 'numbered';
let cursorPages = [{ offset: 0, matchedBefore: 0 }];
let pageCache = {};
let searchController = null;
const PAGE_SIZE = 50;
const TRUNCATE_LEN = 140;

// ===== Format helpers =====
function formatTime(t) {
  if (!t) return '';
  return t.replace(/^2026-/, '').replace(/-05-/, '/5/').replace(' ', ' ');
}

function escapeHtml(s) {
  let d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function parseJsonResponse(response) {
  return response.text().then(function(text) {
    var contentType = response.headers.get('content-type') || '';
    if (!response.ok) {
      throw new Error('HTTP ' + response.status + ': ' + (text || response.statusText));
    }
    if (contentType.indexOf('application/json') < 0) {
      throw new Error(text || '服务器返回了非 JSON 响应');
    }
    try {
      return JSON.parse(text);
    } catch (err) {
      throw new Error('服务器返回了无法解析的数据');
    }
  });
}

function highlightText(text, keywords) {
  if (!keywords || keywords.length === 0) return escapeHtml(text);
  let escaped = escapeHtml(text);
  keywords.forEach(k => {
    if (!k) return;
    let re = new RegExp('(' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    escaped = escaped.replace(re, '<mark>$1</mark>');
  });
  return escaped;
}

// ===== Truncation =====
function truncateContent(text) {
  if (text.length <= TRUNCATE_LEN) return { truncated: false, preview: text, full: text };
  return { truncated: true, preview: text.substring(0, TRUNCATE_LEN) + '...', full: text };
}

// ===== Render post card =====
let _postData = {};       // index -> { fullContent, postId, commentCount }
let _contentState = {};   // index -> bool (true=expanded, false=collapsed)

function renderPost(post, index, keywords) {
  let fullContent = post.content || '';
  let tc = truncateContent(fullContent);
  _postData[index] = { fullContent: fullContent, postId: post.id, commentCount: post.comments || 0 };
  _contentState[index] = false;

  // ---- Header: [category] user #ID ······ time ----
  let hdrHtml = '<div class="post-header">' +
    '<div class="left">' +
      '<span class="post-cat">' + escapeHtml(post.category || '?') + '</span>' +
      '<span class="post-user">' + escapeHtml(post.user || '?') + '</span>' +
      '<span class="post-id">#' + escapeHtml(post.id) + '</span>' +
    '</div>' +
    '<span class="post-time-right">' + escapeHtml(post.time || '') + '</span>' +
  '</div>';

  // ---- Content ----
  let truncatedClass = tc.truncated ? ' collapsed' : '';
  let displayText = tc.truncated ? tc.preview : fullContent;
  let contentHtml = '<div class="post-content' + truncatedClass + '" id="content-' + index + '">' +
    highlightText(displayText, keywords) +
  '</div>';

  // ---- Expand bar (only if truncated) ----
  let expandBarHtml = '';
  if (tc.truncated) {
    expandBarHtml = '<div class="expand-bar" id="expbar-' + index + '">' +
      '<span class="expand-btn" id="expbtn-' + index + '" onclick="toggleContent(' + index + ')">&#9654; 展开全文 (' + fullContent.length + '字)</span>' +
    '</div>';
  }

  // ---- Bottom row: comment toggle (left) + stats (right) ----
  let bottomRowHtml = '<div class="post-bottom-row">';

  if (post.comments > 0) {
    bottomRowHtml += '<span class="comment-toggle-inline" id="cmt-btn-' + index + '" onclick="toggleComments(' + index + ')">&#9654; 展开 ' + post.comments + ' 条评论</span>';
  } else {
    bottomRowHtml += '<span></span>';  // spacer
  }

  bottomRowHtml += '<span class="post-stats-inline">' +
      '<span>&#10084; ' + (post.stars||0) + '</span>' +
      '<span>&#128172; ' + (post.comments||0) + '</span>' +
    '</span>' +
  '</div>';

  // ---- Comments container ----
  let cmtContainer = '<div class="comments-wrap" id="cmts-' + index + '" style="display:none"></div>';

  return '<div class="post" id="post-' + index + '">' +
    hdrHtml + contentHtml + expandBarHtml + bottomRowHtml + cmtContainer +
  '</div>';
}

// ===== Content expand/collapse =====
function toggleContent(index) {
  var contentEl = document.getElementById('content-' + index);
  var data = _postData[index];
  if (!contentEl || !data) return;

  var keywords = currentQuery.split(/\s+/).filter(Boolean);
  var isCollapsed = contentEl.classList.contains('collapsed');

  if (isCollapsed) {
    // ----- EXPAND -----
    contentEl.classList.remove('collapsed');
    contentEl.style.maxHeight = 'none';
    contentEl.style.overflow = 'visible';
    contentEl.innerHTML = highlightText(data.fullContent, keywords);
    _contentState[index] = true;

    // Update button text (don't recreate the element, just change textContent)
    var expBtn = document.getElementById('expbtn-' + index);
    if (expBtn) expBtn.textContent = '▼ 收起';
  } else {
    // ----- COLLAPSE -----
    var tc = truncateContent(data.fullContent);
    contentEl.classList.add('collapsed');
    contentEl.style.maxHeight = '';
    contentEl.style.overflow = '';
    contentEl.innerHTML = highlightText(tc.preview, keywords);
    _contentState[index] = false;

    var expBtn = document.getElementById('expbtn-' + index);
    if (expBtn) expBtn.textContent = '▶ 展开全文 (' + data.fullContent.length + '字)';
  }
}

// ===== Comment toggle =====
var _commentsLoaded = {};  // index -> bool

function toggleComments(index) {
  var wrap = document.getElementById('cmts-' + index);
  var btn = document.getElementById('cmt-btn-' + index);
  var data = _postData[index];
  if (!wrap || !btn || !data) return;

  var isVisible = wrap.style.display === 'block';

  if (isVisible) {
    // Hide
    wrap.style.display = 'none';
    btn.textContent = '▶ 展开 ' + data.commentCount + ' 条评论';
  } else {
    // Show
    wrap.style.display = 'block';
    btn.textContent = '▼ 收起评论';

    if (!_commentsLoaded[index]) {
      loadComments(index, data.postId);
    }
  }
}

function loadComments(index, postId) {
  var wrap = document.getElementById('cmts-' + index);
  if (!wrap) return;

  wrap.innerHTML = '<div class="loading"><span class="spinner"></span>加载评论...</div>';

  fetch('/api/comments?id=' + encodeURIComponent(postId))
    .then(parseJsonResponse)
    .then(function(data) {
      var cmts = data.comment_list || [];
      if (cmts.length === 0) {
        wrap.innerHTML = '<div style="color:#999;text-align:center;padding:20px;">暂无评论</div>';
      } else {
        wrap.innerHTML = renderComments(cmts, currentQuery.split(/\s+/).filter(Boolean));
      }
      _commentsLoaded[index] = true;
    })
    .catch(function(err) {
      wrap.innerHTML = '<div style="color:#e94560;text-align:center;padding:20px;">评论加载失败: ' + escapeHtml(err.message) + '</div>';
    });
}

function renderComments(cmts, keywords) {
  function renderLevel(items, depth) {
    var levelParts = [];
    for (var i = 0; i < items.length; i++) {
      var c = items[i];
      var num = i + 1;
      var txt = highlightText(c.detail || '', keywords);
      var isOp = c.is_publisher == 1;
      var opTag = isOp ? ' <span class="op-tag">楼主</span>' : '';
      var replyTo = c.reply_show_user_name ? ' 回复 ' + escapeHtml(c.reply_show_user_name) : '';
      var replies = c.children || c.reply_comment_list || [];
      var nested = replies.length > 0
        ? '<div class="replies">' + renderLevel(replies, depth + 1) + '</div>'
        : '';
      var marker = depth === 0 ? '<b style="color:#8b0012;">#' + num + '</b> ' : '';
      var cls = depth === 0 ? 'cmt' : 'reply';
      levelParts.push(
        '<div class="' + cls + '">' +
          '<div class="cmt-meta">' + marker + escapeHtml(c.show_user_name || '?') + replyTo + opTag + '</div>' +
          '<div class="cmt-text">' + txt + '</div>' +
          nested +
        '</div>'
      );
    }
    return levelParts.join('');
  }
  return renderLevel(cmts, 0);
}

// ===== Search & Pagination =====
function doSearch() {
  currentQuery = document.getElementById('q').value.trim();
  currentPage = 1;
  cursorPages = [{ offset: 0, matchedBefore: 0 }];
  pageCache = {};
  fetchResults();
}

function setSort(sort) {
  currentSort = sort;
  currentPage = 1;
  cursorPages = [{ offset: 0, matchedBefore: 0 }];
  pageCache = {};
  document.querySelectorAll('.sort-bar button').forEach(b => b.classList.remove('active'));
  let btnId = 'btn-' + sort;
  let btn = document.getElementById(btnId);
  if (btn) btn.classList.add('active');
  fetchResults();
}

function goToPage(page) {
  if (page < 1) return;
  if (paginationMode === 'numbered' && page > totalPages) return;
  saveCurrentPage();
  currentPage = page;
  if (pageCache[page]) {
    restorePage(page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  fetchResults();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function saveCurrentPage() {
  var resultsEl = document.getElementById('results');
  if (!resultsEl || resultsEl.querySelector('.loading')) return;
  pageCache[currentPage] = {
    html: resultsEl.innerHTML,
    count: document.getElementById('count-text').textContent,
    postData: Object.assign({}, _postData),
    contentState: Object.assign({}, _contentState),
    commentsLoaded: Object.assign({}, _commentsLoaded),
    data: resultsEl._pageData
  };
}

function restorePage(page) {
  var cached = pageCache[page];
  if (!cached) return;
  var resultsEl = document.getElementById('results');
  resultsEl.innerHTML = cached.html;
  resultsEl._pageData = cached.data;
  _postData = Object.assign({}, cached.postData);
  _contentState = Object.assign({}, cached.contentState);
  _commentsLoaded = Object.assign({}, cached.commentsLoaded);
  document.getElementById('count-text').textContent = cached.count;
  renderPagination(cached.data);
}

function getFilterParams() {
  var parts = [];
  var cat = document.getElementById('filter-category').value;
  if (cat) parts.push('category=' + encodeURIComponent(cat));
  var date = document.getElementById('filter-date').value;
  if (date) parts.push('date=' + date);
  return parts.length ? '&' + parts.join('&') : '';
}

function fetchResults() {
  let resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';
  document.getElementById('pagination').innerHTML = '';
  if (searchController) searchController.abort();
  searchController = new AbortController();

  var cursor = cursorPages[currentPage - 1] || { offset: 0, matchedBefore: 0 };
  let url = '/api/search?q=' + encodeURIComponent(currentQuery) +
    '&sort=' + currentSort +
    '&page=' + currentPage +
    '&limit=' + PAGE_SIZE +
    '&cursor=1&scan_offset=' + cursor.offset +
    '&matched_before=' + cursor.matchedBefore +
    getFilterParams();

  fetch(url, { signal: searchController.signal })
    .then(parseJsonResponse)
    .then(data => {
      paginationMode = data.pagination_mode || 'numbered';
      totalPages = data.total_pages || currentPage;
      let keywords = currentQuery.split(/\s+/).filter(Boolean);

      if (paginationMode === 'cursor' && !data.total_exact) {
        document.getElementById('count-text').textContent =
          '本页 ' + (data.results || []).length + ' 条';
      } else {
        document.getElementById('count-text').textContent =
          '共 ' + (data.total || 0) + ' 条结果';
      }

      if (!data.results || data.results.length === 0) {
        resultsEl.innerHTML = '<div class="empty"><div class="icon">&#128269;</div><div class="text">没有找到匹配的帖子</div></div>';
      } else {
        _postData = {};
        _contentState = {};
        _commentsLoaded = {};
        resultsEl.innerHTML = data.results.map((p, i) => renderPost(p, i, keywords)).join('');
      }

      resultsEl._pageData = data;
      if (paginationMode === 'cursor' && data.has_more) {
        cursorPages[currentPage] = {
          offset: data.next_offset,
          matchedBefore: data.matched_so_far
        };
      }
      renderPagination(data);
    })
    .catch(err => {
      if (err.name === 'AbortError') return;
      resultsEl.innerHTML = '<div class="empty"><div class="text">搜索超时或连接中断，请缩小搜索范围；特殊符号/单字搜索可能较慢。</div></div>';
    });
}

function renderPagination(data) {
  let pgEl = document.getElementById('pagination');
  if (data.pagination_mode === 'cursor') {
    let html = '';
    html += '<button ' + (currentPage <= 1 ? 'disabled' : '') +
      ' onclick="goToPage(' + (currentPage - 1) + ')">&#171; 上一页</button>';
    html += '<span class="page-info">第 ' + currentPage + ' 页</span>';
    html += '<button ' + (!data.has_more ? 'disabled' : '') +
      ' onclick="goToPage(' + (currentPage + 1) + ')">下一页 &#187;</button>';
    if (data.total_exact) {
      html += '<span class="total-pages">共 ' + data.total + ' 条</span>';
    }
    pgEl.innerHTML = html;
    return;
  }
  let total = data.total_pages;
  if (total <= 1) { pgEl.innerHTML = ''; return; }

  let html = '';
  html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">&#171; 上一页</button>';

  html += '<span class="page-info">第</span>';
  html += '<input type="number" class="page-input" id="page-input" value="' + currentPage + '" min="1" max="' + total + '" onkeydown="if(event.key===\'Enter\')goToPage(parseInt(this.value))">';
  html += '<span class="page-info">/ ' + total + ' 页</span>';

  html += '<button ' + (currentPage >= total ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">下一页 &#187;</button>';

  html += ' <span class="total-pages">共 ' + total + ' 页</span>';
  pgEl.innerHTML = html;
}

// ===== Init =====
document.getElementById('q').addEventListener('input', function() {
  clearTimeout(this._timer);
  this._timer = setTimeout(doSearch, 250);
});

var categoryTimer = null;
document.getElementById('filter-category').addEventListener('input', function() {
  clearTimeout(categoryTimer);
  categoryTimer = setTimeout(doSearch, 350);

// Load frequent category suggestions. Rare tags can still be typed manually.
fetch('/api/categories')
  .then(parseJsonResponse)
  .then(function(data) {
    var sel = document.getElementById('category-options');
    var counts = data.category_counts || {};
    (data.categories || []).forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c;
      if (counts[c]) opt.label = c + ' · ' + counts[c];
      sel.appendChild(opt);
    });
  })
  .catch(function() {});

// ===== AI Search =====
var aiActivated = false;
var _aiPostData = {};
var _aiCommentsLoaded = {};

function aiShowError(msg) {
  var result = document.getElementById('ai-result');
  result.style.display = 'block';
  result.innerHTML = '<div><span class="ai-error">' + escapeHtml(msg) + '</span></div>';
}

function _aiUpdateBar() {
  if (aiActivated) {
    document.getElementById('ai-bar-invite').style.display = 'none';
    document.getElementById('ai-bar-query').style.display = 'inline-flex';
  } else {
    document.getElementById('ai-bar-invite').style.display = 'inline-flex';
    document.getElementById('ai-bar-query').style.display = 'none';
    document.getElementById('ai-result').style.display = 'none';
    document.getElementById('ai-status').textContent = '';
  }
}

function checkAiStatus() {
  fetch('/api/ai/status')
    .then(function(r) {
      if (r.status === 401) { aiActivated = false; _aiUpdateBar(); return; }
      return parseJsonResponse(r);
    })
    .then(function(d) {
      if (d && d.ok) {
        aiActivated = true;
        _aiUpdateBar();
        document.getElementById('ai-status').textContent = '剩余 ' + d.remaining + '/' + d.daily_quota;
      }
    })
    .catch(function(){});
}

function aiActivate() {
  var code = document.getElementById('ai-invite-code').value.trim().toUpperCase();
  if (!code) { alert('请输入邀请码'); return; }
  var btn = document.getElementById('ai-activate-btn');
  btn.disabled = true; btn.textContent = '...';
  fetch('/api/ai/activate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({code: code})
  })
    .then(parseJsonResponse)
    .then(function(d) {
      if (d.ok) {
        aiActivated = true;
        _aiUpdateBar();
        document.getElementById('ai-status').textContent = '剩余 ' + d.remaining + '/' + d.daily_quota;
        document.getElementById('ai-invite-code').value = '';
      } else {
        alert('激活失败: ' + (d.error || '未知错误'));
      }
    })
    .catch(function(err) { alert('网络错误: ' + err.message); })
    .finally(function() { btn.disabled = false; btn.textContent = '激活'; });
}

function aiSearch() {
  var query = document.getElementById('ai-query').value.trim();
  if (!query) return;
  var btn = document.getElementById('ai-search-btn');
  var resultEl = document.getElementById('ai-result');

  btn.disabled = true;
  btn.innerHTML = '<span class="ai-spinner"></span>';
  resultEl.style.display = 'none';
  document.getElementById('ai-status').textContent = '';

  fetch('/api/ai/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: query})
  })
    .then(parseJsonResponse)
    .then(function(d) {
      if (d.ok) {
        _aiPostData = {};
        _aiCommentsLoaded = {};
        var answer = d.answer || {overview: d.summary || '', findings: [], caveat: ''};
        var findings = (answer.findings || []).map(function(item) {
          return '<li><strong>' + escapeHtml(item.title || '相关发现') + '</strong>：' +
            escapeHtml(item.detail || '') + '</li>';
        }).join('');
        var answerHtml = '<div class="ai-answer-card">' +
          '<div class="ai-overview">' + escapeHtml(answer.overview || '') + '</div>' +
          (findings ? '<ol class="ai-findings">' + findings + '</ol>' : '') +
          (answer.caveat ? '<div class="ai-caveat">说明：' + escapeHtml(answer.caveat) + '</div>' : '') +
          renderAiEvidenceSummary(d.evidence_stats || {}) +
        '</div>';
        var evidence = (d.evidence_posts || []).map(function(post, index) {
          return renderAiEvidencePost(post, index, query);
        }).join('');
        resultEl.style.display = 'block';
        resultEl.innerHTML = answerHtml +
          (evidence ? '<div class="ai-evidence-title">回答依据</div>' + evidence : '');
        if (d.remaining !== undefined) {
          document.getElementById('ai-status').textContent = '剩余 ' + d.remaining + '/' + d.daily_quota;
        }
      } else {
        if (d.error && d.error.indexOf('请先激活') >= 0) {
          aiActivated = false; _aiUpdateBar(); alert('会话已过期，请重新输入邀请码');
        } else {
          aiShowError(d.error || '未知错误');
        }
      }
    })
    .catch(function(err) { aiShowError('网络错误: ' + err.message); })
    .finally(function() { btn.disabled = false; btn.textContent = '搜索'; });
}

function renderAiEvidenceSummary(stats) {
  return '<div class="ai-evidence-summary">检索 ' + (stats.candidate_posts || 0) +
    ' 条候选帖子，选取前 ' + (stats.context_posts || 0) +
    ' 条作为回答上下文；其中正文命中 ' + (stats.body_matched_posts || 0) +
    ' 条、评论命中 ' + (stats.comment_matched_posts || 0) +
    ' 条帖子（共 ' + (stats.matched_comments || 0) +
    ' 条相关评论），回答实际引用 ' + (stats.cited_posts || 0) + ' 条。</div>';
}

function renderAiEvidencePost(post, index, query) {
  var fullContent = post.content || '';
  var tc = truncateContent(fullContent);
  var keywords = (post.body_match_terms || []).length
    ? post.body_match_terms
    : query.split(/\s+/).filter(Boolean);
  _aiPostData[index] = {postId: post.id, commentCount: post.comments || 0};

  var header = '<div class="post-header"><div class="left">' +
    '<span class="post-cat">' + escapeHtml(post.category || '?') + '</span>' +
    '<span class="post-user">' + escapeHtml(post.user || '?') + '</span>' +
    '<span class="post-id">#' + escapeHtml(post.id) + '</span></div>' +
    '<span class="post-time-right">' + escapeHtml(post.time || '') + '</span></div>';
  var content = '<div class="post-content">' +
    highlightText(tc.preview, keywords) + '</div>';
  var matchInfo = '<div class="ai-match-info">' +
    ((post.body_match_terms || []).length
      ? '正文命中：' + (post.body_match_terms || []).map(escapeHtml).join('、')
      : '正文未直接命中') +
    ' · 相关评论 ' + (post.comment_match_count || 0) + ' 条</div>';
  var commentRefs = (post.matched_comments || []).map(function(c) {
    return '<div class="ai-comment-reference"><div class="meta">' +
      escapeHtml(c.user_name || '?') + ' · ' + escapeHtml(c.time || '') +
      (c.is_publisher === 1 ? ' · 楼主' : '') + '</div>' +
      highlightText(c.detail || '', keywords) + '</div>';
  }).join('');
  var toggle = post.comments > 0
    ? '<span class="comment-toggle-inline" id="ai-cmt-btn-' + index +
      '" onclick="toggleAiComments(' + index + ')">&#9654; 展开 ' +
      post.comments + ' 条评论</span>'
    : '<span></span>';
  var bottom = '<div class="post-bottom-row">' + toggle +
    '<span class="post-stats-inline"><span>&#10084; ' + (post.stars || 0) +
    '</span><span>&#128172; ' + (post.comments || 0) + '</span></span></div>';
  return '<div class="post">' + header + content + matchInfo + commentRefs + bottom +
    '<div class="comments-wrap" id="ai-cmts-' + index +
    '" style="display:none"></div></div>';
}

function toggleAiComments(index) {
  var wrap = document.getElementById('ai-cmts-' + index);
  var btn = document.getElementById('ai-cmt-btn-' + index);
  var data = _aiPostData[index];
  if (!wrap || !btn || !data) return;
  if (wrap.style.display === 'block') {
    wrap.style.display = 'none';
    btn.textContent = '▶ 展开 ' + data.commentCount + ' 条评论';
    return;
  }
  wrap.style.display = 'block';
  btn.textContent = '▼ 收起评论';
  if (_aiCommentsLoaded[index]) return;
  wrap.innerHTML = '<div class="loading"><span class="spinner"></span>加载评论...</div>';
  fetch('/api/comments?id=' + encodeURIComponent(data.postId))
    .then(parseJsonResponse)
    .then(function(payload) {
      wrap.innerHTML = renderComments(payload.comment_list || [], []);
      _aiCommentsLoaded[index] = true;
    })
    .catch(function(err) {
      wrap.innerHTML = '<div class="ai-error">评论加载失败：' + escapeHtml(err.message) + '</div>';
    });
}

function searchById(postId) {
  document.getElementById('q').value = postId;
  currentSort = 'time'; currentPage = 1;
  document.querySelectorAll('.sort-bar button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn-time').classList.add('active');
  fetchResults();
  window.scrollTo({top: document.getElementById('q').offsetTop - 20, behavior: 'smooth'});
}

document.addEventListener('DOMContentLoaded', function() {
  updateThemeButton();
  // Enter in AI query input
  var aiQuery = document.getElementById('ai-query');
  if (aiQuery) {
    aiQuery.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); aiSearch(); }
    });
  }
  // Enter in invite code input
  var aiInvite = document.getElementById('ai-invite-code');
  if (aiInvite) {
    aiInvite.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); aiActivate(); }
    });
  }
  checkAiStatus();
  fetchResults();
});
</script>
</body>
</html>
