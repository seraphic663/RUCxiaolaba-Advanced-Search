<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 — RUC小喇叭</title>
<script>
(function() {
  var theme = localStorage.getItem('rucxlb-theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }
.header { background: #8b0012; color: #fff; padding: 18px 24px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
.header h2 { color: #fff; font-size: 1.25em; }
.header .nav { display: flex; gap: 14px; align-items: center; font-size: 0.86em; flex-wrap: wrap; }
.header .nav a { color: rgba(255,255,255,.78); text-decoration: none; }
.header .nav a:hover { color: #fff; }
.theme-toggle { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,.28); border-radius: 50%; background: transparent; color: rgba(255,255,255,.82); cursor: pointer; font-size: 17px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
.theme-toggle:hover { color: #fff; border-color: rgba(255,255,255,.65); }
.stats { max-width: 1040px; margin: 0 auto 14px; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
.stat-card { background: #fff; padding: 12px; border-radius: 8px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #eee; }
.stat-card .num { font-size: 1.55em; color: #8b0012; font-weight: bold; }
.stat-card .label { color: #777; font-size: 0.75em; margin-top: 2px; }
.filters { max-width: 1040px; margin: 0 auto 10px; padding: 10px 14px; background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.filter-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.filter-row + .filter-row { margin-top: 7px; }
.filter-row.primary { display: grid; grid-template-columns: minmax(200px, 1fr) auto auto; gap: 8px; align-items: center; }
.control-grid { display: grid; grid-template-columns: minmax(410px, 1fr) minmax(330px, .9fr) minmax(150px, .35fr); gap: 8px; align-items: start; }
.control-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-width: 0; }
.filters .select-group select { flex: 1 1 0; min-width: 92px; }
.field-group .field-toggle { flex: 0 0 auto; }
.match-group { justify-content: flex-end; }
.filters input[type=text] { width: 100%; min-width: 0; padding: 7px 11px; border: 2px solid #ddd; border-radius: 8px; background: #fff; color: #222; font-size: 14px; outline: none; height: 36px; }
.filters .select-group input[type=text] { flex: 1 1 0; min-width: 120px; max-width: 190px; height: 30px; padding: 4px 9px; border-width: 1px; border-radius: 7px; font-size: 12px; }
.filters input:focus { border-color: #8b0012; }
.filters select { flex: 1 1 118px; min-width: 112px; max-width: 170px; padding: 4px 9px; border: 1px solid #ddd; border-radius: 7px; background: #fff; color: #333; font-size: 12px; outline: none; height: 30px; }
.filters select:focus { border-color: #8b0012; }
.field-toggle { position: relative; display: inline-flex; align-items: center; justify-content: center; height: 30px; padding: 0 11px; border: 1px solid #ddd; border-radius: 999px; color: #555; background: #fff; font-size: 12px; cursor: pointer; user-select: none; white-space: nowrap; transition: background .15s, border-color .15s, color .15s; }
.field-toggle input { position: absolute; opacity: 0; pointer-events: none; }
.field-toggle:has(input:checked) { background: #8b0012; border-color: #8b0012; color: #fff; }
.filters button { padding: 7px 22px; border: none; border-radius: 8px; background: #8b0012; color: #fff; cursor: pointer; font-size: 14px; white-space: nowrap; height: 36px; }
.filters button:hover { background: #6d000e; }
.search-mode-pill { display: inline-flex; align-items: center; min-height: 26px; max-width: 280px; padding: 2px 10px; border-radius: 999px; background: #f8eeee; color: #8b0012; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.match-select { display: none; }
.match-select.active { display: inline-block; flex: 1 1 132px; max-width: 170px; }
#results { max-width: 1040px; margin: 0 auto; padding: 0 16px; }
.results { border-radius: 8px; overflow: hidden; }
.result-row { background: #fff; padding: 14px 18px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: box-shadow .15s, border-color .15s; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.result-row:hover { border-color: #e6b8bf; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.result-row .top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; font-size: 0.8em; }
.result-row .top .uid { color: #8b0012; font-family: monospace; font-weight: bold; }
.result-row .top .meta { color: #999; }
.result-row .text { line-height: 1.7; color: #222; white-space: pre-wrap; word-break: break-word; font-size: 0.92em; }
.result-row .stats-row { color: #888; font-size: 0.8em; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
.post-stats-inline { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
.toggle-cmts { color: #8b0012; cursor: pointer; user-select: none; white-space: nowrap; }
.toggle-cmts:hover { text-decoration: underline; }
.identity-pill { display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px; font-size: 0.82em; font-weight: 600; }
.identity-pill.anonymous { color: #777; background: #f2f2f2; }
.identity-pill.real { color: #2e7d32; background: #eaf6ed; }
.identity-pill.unknown { color: #8a6d3b; background: #fff7df; }
.comments-panel { display: none; border-left: 2px solid #eee; margin: 10px 0 0 0; padding-left: 12px; }
.comments-panel.open { display: block; }
.cmt { padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 0.86em; }
.cmt:last-child { border-bottom: none; }
.cmt .cmt-uid { color: #8b0012; font-family: monospace; font-size: 0.85em; }
.cmt .cmt-name { color: #777; font-size: 0.85em; }
.cmt .cmt-text { color: #444; margin-top: 2px; line-height: 1.6; }
.cmt .reply-to { color: #999; font-size: 0.8em; margin-left: 4px; }
.cmt .nested { margin-left: 10px; border-left: 1px solid #eee; padding-left: 10px; margin-top: 4px; }
.pagination { max-width: 1040px; margin: 0 auto; display: flex; justify-content: center; gap: 6px; padding: 16px; flex-wrap: wrap; }
.pagination button { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #333; cursor: pointer; font-size: 0.85em; }
.pagination button:hover { border-color: #8b0012; color: #8b0012; }
.pagination button.active { background: #8b0012; color: #fff; border-color: #8b0012; }
.pagination button:disabled { opacity: 0.3; cursor: default; }
mark { background: #fff0b3; color: #111; padding: 0 2px; border-radius: 2px; }
.no-results { text-align: center; color: #999; padding: 40px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
.loading { text-align: center; color: #999; padding: 40px; background: #fff; border-radius: 8px; border: 1px solid #eee; }
@media (max-width: 700px) {
  .header { padding: 14px 12px; }
  .filters { padding: 8px; }
  .filter-row.primary { grid-template-columns: 1fr auto; }
  .filter-row.primary .search-mode-pill { display: none; }
  .filter-row:not(.primary) { gap: 4px; }
  .control-grid { gap: 5px; }
  .control-group { gap: 4px; }
  .filters input[type=text] { height: 33px; font-size: 13px; }
  .filters .select-group input[type=text] { flex: 1 1 calc(50% - 4px); min-width: 0; max-width: none; height: 27px; padding: 3px 7px; font-size: 12px; }
  .filters select { flex: 1 1 calc(50% - 4px); min-width: 0; max-width: none; height: 27px; padding: 3px 7px; }
  .field-toggle { flex: 1 1 auto; min-width: 52px; height: 26px; padding: 0 7px; }
  .match-select.active { flex: 1 1 96px; min-width: 96px; max-width: none; }
  .match-group { justify-content: stretch; }
  .filters button { height: 33px; padding-left: 15px; padding-right: 15px; }
  .result-row .stats-row { align-items: flex-start; }
  .post-stats-inline { justify-content: flex-start; }
}
@media (max-width: 920px) {
  .control-grid { grid-template-columns: 1fr; }
  .match-group { justify-content: flex-start; }
}
@media (min-width: 701px) and (max-width: 920px) {
  .control-grid { grid-template-columns: minmax(340px, .95fr) minmax(300px, 1fr); }
  .match-group { grid-column: 1 / -1; }
}
/* ── AI Test ── */
.ai-section { max-width: 1040px; margin: 0 auto 14px; padding: 0 16px; }
.ai-card { background: #fff; padding: 14px; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.ai-card h3 { font-size: 0.95em; color: #8b0012; margin-bottom: 8px; }
.ai-row { display: flex; gap: 8px; }
.ai-row input { flex: 1; padding: 7px 11px; border: 2px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
.ai-row input:focus { border-color: #8b0012; }
.ai-row button { padding: 7px 18px; border: none; border-radius: 8px; background: #8b0012; color: #fff; cursor: pointer; font-size: 13px; white-space: nowrap; height: 34px; }
.ai-row button:disabled { background: #ccc; cursor: not-allowed; }
.ai-response { margin-top: 10px; line-height: 1.7; font-size: 0.9em; white-space: pre-wrap; word-break: break-word; display: none; }
.ai-response.active { display: block; }
.ai-response .ai-cited { margin-top: 8px; font-size: 0.85em; color: #8b0012; }
.ai-debug { margin-top: 8px; font-size: 0.78em; color: #666; background: #f8f8f8; padding: 8px; border-radius: 6px; display: none; }
.ai-debug.active { display: block; }
.ai-findings { padding-left: 20px; margin-top: 8px; }
.ai-findings li { margin: 6px 0; line-height: 1.6; }
.ai-findings strong { color: #8b0012; }
.ai-caveat { color: #777; font-size: 0.86em; border-top: 1px solid #eee; padding-top: 7px; margin-top: 8px; }
.ai-evidence-list { margin-top: 10px; }
.ai-evidence-list .result-row { cursor: default; }
.ai-reference { margin-top: 6px; padding: 6px 9px; border-left: 3px solid #e4c3c7; background: #fafafa; color: #555; font-size: 0.84em; line-height: 1.55; }

html[data-theme="light"] body { background: #f4f1e8; color: #2f2d29; }
html[data-theme="light"] .filters,
html[data-theme="light"] .result-row,
html[data-theme="light"] .stat-card,
html[data-theme="light"] .ai-card,
html[data-theme="light"] .loading,
html[data-theme="light"] .no-results { background: #fffdf8; border-color: #e1dbcf; }
html[data-theme="light"] .filters input[type=text],
html[data-theme="light"] .filters select,
html[data-theme="light"] .ai-row input,
html[data-theme="light"] .pagination button,
html[data-theme="light"] .field-toggle { background: #fffdf8; border-color: #d9d3c7; }
html[data-theme="light"] .result-row .stats-row,
html[data-theme="light"] .cmt,
html[data-theme="light"] .ai-caveat { border-color: #e8e2d7; }
html[data-theme="light"] .comments-panel,
html[data-theme="light"] .cmt .nested { border-color: #ded8cc; }
html[data-theme="light"] .ai-debug,
html[data-theme="light"] .ai-reference { background: #f7f3ea; }

html[data-theme="dark"] { color-scheme: dark; }
html[data-theme="dark"] body { background: #111315; color: #e8e8e8; }
html[data-theme="dark"] .header { background: #65000d; }
html[data-theme="dark"] .filters,
html[data-theme="dark"] .result-row,
html[data-theme="dark"] .stat-card,
html[data-theme="dark"] .ai-card,
html[data-theme="dark"] .loading,
html[data-theme="dark"] .no-results { background: #1a1d20; border-color: #30363c; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
html[data-theme="dark"] .filters input[type=text],
html[data-theme="dark"] .filters select,
html[data-theme="dark"] .ai-row input,
html[data-theme="dark"] .pagination button { background: #1b1f23; border-color: #3b4249; color: #e8e8e8; }
html[data-theme="dark"] input::placeholder { color: #8d949b; }
html[data-theme="dark"] .field-toggle { background: #1b1f23; border-color: #3b4249; color: #c8cdd2; }
html[data-theme="dark"] .field-toggle:has(input:checked) { background: #9d1c2d; border-color: #9d1c2d; color: #fff; }
html[data-theme="dark"] .search-mode-pill { background: #3a1c21; color: #f0a5af; }
html[data-theme="dark"] .result-row .text,
html[data-theme="dark"] .cmt .cmt-text,
html[data-theme="dark"] .ai-response { color: #e0e3e6; }
html[data-theme="dark"] .result-row .top .meta,
html[data-theme="dark"] .cmt .cmt-name,
html[data-theme="dark"] .cmt .reply-to,
html[data-theme="dark"] .post-stats-inline,
html[data-theme="dark"] .result-row .stats-row { color: #929aa2; }
html[data-theme="dark"] .result-row .stats-row,
html[data-theme="dark"] .cmt,
html[data-theme="dark"] .ai-caveat { border-color: #30363c; }
html[data-theme="dark"] .comments-panel,
html[data-theme="dark"] .cmt .nested { border-color: #3b4249; }
html[data-theme="dark"] .identity-pill.anonymous { background: #2a2e33; color: #b5bbc1; }
html[data-theme="dark"] .identity-pill.real { background: #173823; color: #8ed1a1; }
html[data-theme="dark"] .identity-pill.unknown { background: #40351b; color: #e4c77d; }
html[data-theme="dark"] .ai-debug,
html[data-theme="dark"] .ai-reference { background: #202429; color: #cdd2d7; }
html[data-theme="dark"] mark { background: #6d5413; color: #fff2bd; }

html[data-theme="light"] {
  --ui-bg: #f7f5ee;
  --ui-surface: #fffdf7;
  --ui-surface-2: #f1eee5;
  --ui-border: #ddd7ca;
  --ui-text: #2d2b27;
  --ui-muted: #7b766d;
  --ui-accent: #c15f3c;
  --ui-accent-hover: #a84f32;
  --ui-accent-soft: #f3e2d8;
  --ui-shadow: rgba(71, 58, 43, .08);
}
html[data-theme="dark"] {
  --ui-bg: #1f1e1b;
  --ui-surface: #292824;
  --ui-surface-2: #32312c;
  --ui-border: #45423b;
  --ui-text: #eee9df;
  --ui-muted: #aaa398;
  --ui-accent: #d97757;
  --ui-accent-hover: #e58a6c;
  --ui-accent-soft: #493028;
  --ui-shadow: rgba(0, 0, 0, .28);
}
html[data-theme] body { background: var(--ui-bg); color: var(--ui-text); font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
html[data-theme] .header { background: var(--ui-surface-2); color: var(--ui-text); border-bottom: 1px solid var(--ui-border); box-shadow: inset 0 3px 0 var(--ui-accent); }
html[data-theme] .header h2 { color: var(--ui-text); font-family: Georgia, "Songti SC", "STSong", serif; font-weight: 600; }
html[data-theme] .header .nav,
html[data-theme] .header .nav a { color: var(--ui-muted); }
html[data-theme] .header .nav a:hover { color: var(--ui-accent); }
html[data-theme] .theme-toggle { border-color: var(--ui-border); color: var(--ui-muted); background: var(--ui-surface); }
html[data-theme] .theme-toggle:hover { border-color: var(--ui-accent); color: var(--ui-accent); }
html[data-theme] .filters,
html[data-theme] .result-row,
html[data-theme] .stat-card,
html[data-theme] .ai-card,
html[data-theme] .loading,
html[data-theme] .no-results { background: var(--ui-surface); border-color: var(--ui-border); box-shadow: 0 1px 4px var(--ui-shadow); }
html[data-theme] .filters input[type=text],
html[data-theme] .filters select,
html[data-theme] .ai-row input,
html[data-theme] .pagination button,
html[data-theme] .field-toggle { background: var(--ui-surface); border-color: var(--ui-border); color: var(--ui-text); }
html[data-theme] input::placeholder { color: var(--ui-muted); }
html[data-theme] .filters input:focus,
html[data-theme] .filters select:focus,
html[data-theme] .ai-row input:focus { border-color: var(--ui-accent); }
html[data-theme] .filters button,
html[data-theme] .ai-row button,
html[data-theme] .pagination button.active,
html[data-theme] .field-toggle:has(input:checked) { background: var(--ui-accent); border-color: var(--ui-accent); color: #fff; }
html[data-theme] .filters button:hover { background: var(--ui-accent-hover); }
html[data-theme] .search-mode-pill { background: var(--ui-accent-soft); color: var(--ui-accent); }
html[data-theme] .result-row { border-radius: 8px; }
html[data-theme] .result-row:hover { border-color: var(--ui-accent); box-shadow: 0 2px 8px var(--ui-shadow); }
html[data-theme] .result-row .top .uid,
html[data-theme] .toggle-cmts,
html[data-theme] .cmt .cmt-uid,
html[data-theme] .ai-card h3,
html[data-theme] .ai-findings strong,
html[data-theme] .ai-response .ai-cited { color: var(--ui-accent); }
html[data-theme] .result-row .text,
html[data-theme] .cmt .cmt-text,
html[data-theme] .ai-response { color: var(--ui-text); }
html[data-theme] .result-row .top .meta,
html[data-theme] .cmt .cmt-name,
html[data-theme] .cmt .reply-to,
html[data-theme] .post-stats-inline,
html[data-theme] .result-row .stats-row,
html[data-theme] .stat-card .label,
html[data-theme] .loading,
html[data-theme] .no-results { color: var(--ui-muted); }
html[data-theme] .result-row .stats-row,
html[data-theme] .cmt,
html[data-theme] .ai-caveat,
html[data-theme] .comments-panel,
html[data-theme] .cmt .nested { border-color: var(--ui-border); }
html[data-theme] .stat-card .num { color: var(--ui-accent); }
html[data-theme] .ai-debug,
html[data-theme] .ai-reference { background: var(--ui-surface-2); color: var(--ui-text); }
html[data-theme] mark { background: color-mix(in srgb, var(--ui-accent) 28%, var(--ui-surface)); color: var(--ui-text); }
</style>
</head>
<body>
<div class="header">
  <h2>&#128274; 管理面板</h2>
  <div class="nav">
    <span style="color:rgba(255,255,255,.72);font-size:0.8em;" id="db-info">__CSV_SOURCE__ · __TOTAL__帖</span>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="切换深色模式" title="切换深色模式"><span class="theme-icon">☾</span></button>
    <a href="/">返回搜索</a>
    <a href="/admin?logout=1">退出</a>
  </div>
</div>

<div class="filters">
  <div class="filter-row primary">
    <input type="text" id="q" placeholder="搜索关键词（空格 AND）..." autofocus>
    <button onclick="startSearch()">搜索</button>
    <span class="search-mode-pill" id="search-mode">正文检索</span>
  </div>
  <div class="filter-row control-grid">
    <div class="control-group select-group">
      <select id="sort"><option value="time">按时间</option><option value="stars">按点赞</option><option value="comments">按评论</option><option value="score">综合</option></select>
      <select id="date"><option value="">全部时间</option><option value="1d">今天</option><option value="3d">3天</option><option value="7d">7天</option><option value="30d">30天</option></select>
      <select id="identity"><option value="">匿名/实名</option><option value="anonymous">仅看匿名帖</option><option value="real">仅看实名帖</option></select>
      <input type="text" id="category" list="category-options" placeholder="全部分类 / 输入tag" aria-label="分类">
      <datalist id="category-options"></datalist>
    </div>
    <div class="control-group field-group">
      <label class="field-toggle"><input type="checkbox" id="sc-body" checked>正文/帖子侧</label>
      <label class="field-toggle"><input type="checkbox" id="sc-cmt">评论侧</label>
      <label class="field-toggle"><input type="checkbox" id="sc-uid">用户ID</label>
      <label class="field-toggle"><input type="checkbox" id="sc-post">帖子号</label>
      <label class="field-toggle"><input type="checkbox" id="sc-name">昵称</label>
    </div>
    <div class="control-group match-group">
      <select class="match-select" id="id-match" aria-label="用户ID匹配方式"><option value="exact">用户ID精确</option><option value="contains">用户ID包含</option></select>
      <select class="match-select" id="name-match" aria-label="昵称匹配方式"><option value="exact">昵称精确</option><option value="contains">昵称包含</option></select>
    </div>
  </div>
</div>

<div id="results"><div class="loading">输入关键词后点击搜索</div></div>
<div class="pagination" id="pager"></div>

<!-- ═══════════════ AI 测试（Admin Only） ═══════════════ -->
<div class="ai-section">
  <div class="ai-card">
    <h3>🤖 AI 搜索测试（管理员 · 含证据统计）</h3>
    <div class="ai-row">
      <input type="text" id="ai-query" placeholder="自然语言问题，如：最近大家对食堂怎么看？">
      <button id="ai-btn" onclick="aiTest()">AI 搜索</button>
    </div>
    <div class="ai-response" id="ai-resp"></div>
    <div class="ai-debug" id="ai-debug"></div>
  </div>
</div>

<script>
function updateThemeButton() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.querySelectorAll('.theme-icon').forEach(function(icon) {
    icon.textContent = dark ? '☀' : '☾';
  });
  document.querySelectorAll('.theme-toggle').forEach(function(button) {
    var label = dark ? '切换浅色模式' : '切换深色模式';
    button.setAttribute('aria-label', label);
    button.setAttribute('title', label);
  });
}

function toggleTheme() {
  var dark = document.documentElement.getAttribute('data-theme') === 'dark';
  var next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('rucxlb-theme', next);
  updateThemeButton();
}

updateThemeButton();

var currentPage = 1;
var currentKW = [];
var commentsLoaded = {};
var paginationMode = 'numbered';
var cursorPages = [{offset: 0, matchedBefore: 0}];
var pageCache = {};
var searchController = null;

function startSearch() {
  currentPage = 1;
  cursorPages = [{offset: 0, matchedBefore: 0}];
  pageCache = {};
  doSearch();
}

function parseJsonResponse(response) {
  return response.text().then(function(text) {
    var contentType = response.headers.get('content-type') || '';
    if (!response.ok) {
      throw new Error('HTTP ' + response.status + ': ' + (text || response.statusText));
    }
    if (contentType.indexOf('application/json') < 0) {
      throw new Error(text || '服务器返回了非 JSON 响应');
    }
    try {
      return JSON.parse(text);
    } catch (err) {
      throw new Error('服务器返回了无法解析的数据');
    }
  });
}

function saveAdminPage() {
  var results = document.getElementById('results');
  if (!results || results.querySelector('.loading')) return;
  pageCache[currentPage] = {
    html: results.innerHTML,
    data: results._data,
    commentsLoaded: Object.assign({}, commentsLoaded)
  };
}

function goAdminPage(page) {
  if (page < 1) return;
  saveAdminPage();
  currentPage = page;
  if (pageCache[page]) {
    var cached = pageCache[page];
    var results = document.getElementById('results');
    results.innerHTML = cached.html;
    results._data = cached.data;
    commentsLoaded = Object.assign({}, cached.commentsLoaded);
    renderPager(cached.data);
    window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }
  doSearch();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function doSearch() {
  updateSearchMode();
  var q = document.getElementById('q').value.trim();
  currentKW = q ? q.split(/\s+/).filter(Boolean) : [];
  var sort = document.getElementById('sort').value;
  var date = document.getElementById('date').value;
  var identity = document.getElementById('identity').value;
  var category = document.getElementById('category').value;

  var cursor = cursorPages[currentPage - 1] || {offset: 0, matchedBefore: 0};
  var params = [
    'q=' + encodeURIComponent(q), 'sort=' + sort,
    'page=' + currentPage, 'limit=50', 'cursor=1',
    'scan_offset=' + cursor.offset,
    'matched_before=' + cursor.matchedBefore
  ];
  if (date) params.push('date=' + date);
  if (identity) params.push('identity=' + identity);
  if (category) params.push('category=' + encodeURIComponent(category));

  // body/cmt select the data location. When uid/name/post is selected they do
  // not also add a text-content OR condition.
  var scopes = [];
  if (document.getElementById('sc-body').checked) scopes.push('body');
  if (document.getElementById('sc-cmt').checked) scopes.push('cmt');
  if (document.getElementById('sc-uid').checked) scopes.push('uid');
  if (document.getElementById('sc-post').checked) scopes.push('post');
  if (document.getElementById('sc-name').checked) scopes.push('name');
  if (scopes.length === 0) scopes.push('body');
  params.push('admin_fields=' + scopes.join(','));
  if (scopes.indexOf('uid') >= 0) params.push('id_match=' + document.getElementById('id-match').value);
  if (scopes.indexOf('name') >= 0) params.push('name_match=' + document.getElementById('name-match').value);
  if (scopes.indexOf('cmt') >= 0) params.push('scope=all');
  else params.push('scope=content');

  document.getElementById('results').innerHTML = '<div class="loading">搜索中...</div>';
  if (searchController) searchController.abort();
  searchController = new AbortController();

  fetch('/api/search?' + params.join('&'), {signal: searchController.signal})
    .then(parseJsonResponse)
    .then(data => {
      currentPage = data.page;
      paginationMode = data.pagination_mode || 'numbered';
      commentsLoaded = {};
      renderResults(data);
      document.getElementById('results')._data = data;
      if (paginationMode === 'cursor' && data.has_more) {
        cursorPages[currentPage] = {
          offset: data.next_offset,
          matchedBefore: data.matched_so_far
        };
      }
      renderPager(data);
    })
    .catch(e => {
      if (e.name === 'AbortError') return;
      var message = e && e.message && e.message.indexOf('HTTP ') === 0
        ? e.message
        : '搜索超时或连接中断，请缩小搜索范围；特殊符号/单字搜索可能较慢。';
      document.getElementById('results').innerHTML = '<div class="no-results">' + message + '</div>';
    });
}

function highlight(text) {
  var t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  currentKW.forEach(k => {
    var re = new RegExp('(' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    t = t.replace(re, '<mark>$1</mark>');
  });
  return t;
}

function renderResults(data) {
  if (!data.results || data.results.length === 0) {
    document.getElementById('results').innerHTML = '<div class="no-results">无结果</div>';
    return;
  }
  var html = '';
  data.results.forEach(function(p, idx) {
    var hasAdminId = Object.prototype.hasOwnProperty.call(p, 'show_user_id');
    var uid = hasAdminId ? (p.show_user_id || '?') : '未返回';
    var ruid = Object.prototype.hasOwnProperty.call(p, 'real_user_id') ? String(p.real_user_id || '0') : null;
    var idTag = uid;
    var postIdentity = ruid === null
      ? '<span class="identity-pill unknown">ID未返回</span>'
      : ((ruid === '0' || !ruid)
        ? '<span class="identity-pill anonymous">帖子匿名</span>'
        : '<span class="identity-pill real">帖子实名</span>');
    if (ruid !== null && ruid !== '0' && ruid !== uid) idTag += ' <span style="color:#8b0012">real:' + ruid + '</span>';
    html += '<div class="result-row">';
    html += '<div class="top"><span class="uid">ID:' + idTag + postIdentity + '</span><span class="uname" style="color:#777">' + (p.user||'?') + '</span><span class="meta">' + (p.category||'?') + ' &middot; #' + p.id + ' &middot; ' + (p.time||'?').slice(0,16) + '</span></div>';
    html += '<div class="text">' + highlight(p.content||'') + '</div>';
    var cmtToggle = (p.comments > 0) ? '<span class="toggle-cmts" id="cmt-btn-' + idx + '" onclick="toggleCmts(' + idx + ')">▶ 展开 ' + p.comments + ' 条评论</span>' : '<span></span>';
    html += '<div class="stats-row">' + cmtToggle + '<span class="post-stats-inline"><span>❤ ' + (p.stars||0) + '</span><span>💬 ' + (p.comments||0) + '</span></span></div>';
    html += '<div class="comments-panel" id="cmts-' + idx + '"></div>';
    html += '</div>';
  });
  document.getElementById('results').innerHTML = html;
  document.getElementById('results')._data = data;
}

function renderComments(panel, comments) {
  if (!comments || comments.length === 0) return '无评论';
  function renderLevel(items) {
    var h = '';
    items.forEach(function(c) {
      var children = c.children || c.reply_comment_list || [];
      h += '<div class="cmt">';
      h += '<span class="cmt-uid">' + (c.show_user_id||'?') + '</span> ';
      h += identityPill(c.real_user_id, '回复', c.hasOwnProperty('real_user_id'));
      h += '<span class="cmt-name">' + (c.show_user_name||'?') + '</span>';
      if (c.is_publisher == 1) h += ' <span style="color:#8b0012">楼主</span>';
      if (c.reply_show_user_id) h += '<span class="reply-to">→ ' + (c.reply_show_user_name||c.reply_show_user_id||'?') + '</span>';
      h += '<div class="cmt-text">' + highlight(c.detail||'') + '</div>';
      if (children.length > 0) h += '<div class="nested">' + renderLevel(children) + '</div>';
      h += '</div>';
    });
    return h;
  }
  return renderLevel(comments);
}

function identityPill(realUserId, label, known) {
  if (!known) return '<span class="identity-pill anonymous">' + label + '匿名未知</span> ';
  var ruid = String(realUserId || '0');
  if (ruid === '0') return '<span class="identity-pill anonymous">' + label + '匿名</span> ';
  return '<span class="identity-pill real">' + label + '实名</span> ';
}

function toggleCmts(idx) {
  var panel = document.getElementById('cmts-' + idx);
  var btn = document.getElementById('cmt-btn-' + idx);
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    if (btn) btn.textContent = '▶ 展开评论';
    return;
  }
  var data = document.getElementById('results')._data;
  if (!data) return;
  var p = data.results[idx];
  panel.classList.add('open');
  if (btn) btn.textContent = '▼ 收起评论';
  if (commentsLoaded[idx]) return;
  panel.innerHTML = '<div class="loading">加载评论...</div>';
  fetch('/api/comments?id=' + encodeURIComponent(p.id))
    .then(parseJsonResponse)
    .then(function(payload) {
      panel.innerHTML = renderComments(panel, payload.comment_list || []);
      commentsLoaded[idx] = true;
    })
    .catch(function(err) {
      panel.innerHTML = '<div class="no-results">评论加载失败: ' + highlight(err.message || String(err)) + '</div>';
    });
}

function renderPager(data) {
  var h = '';
  if (data.pagination_mode === 'cursor') {
    h += '<button ' + (data.page <= 1 ? 'disabled' : '') +
      ' onclick="goAdminPage(' + (data.page - 1) + ')">上一页</button>';
    h += '<span style="color:#666;font-size:0.82em;">第 ' + data.page + ' 页</span>';
    h += '<button ' + (!data.has_more ? 'disabled' : '') +
      ' onclick="goAdminPage(' + (data.page + 1) + ')">下一页</button>';
    h += '<span style="color:#888;font-size:0.8em;margin-left:8px;">' +
      (data.total_exact ? '共 ' + data.total + ' 条' : '本页 ' + (data.results || []).length + ' 条') +
      '</span>';
    document.getElementById('pager').innerHTML = h;
    return;
  }
  if (data.total_pages <= 1) { document.getElementById('pager').innerHTML = ''; return; }
  h += '<button ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="goAdminPage(1)">首页</button>';
  h += '<button ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="goAdminPage(' + (data.page-1) + ')">上一页</button>';
  var start = Math.max(1, data.page - 3);
  var end = Math.min(data.total_pages, data.page + 3);
  for (var i = start; i <= end; i++) {
    h += '<button class="' + (i === data.page ? 'active' : '') + '" onclick="goAdminPage(' + i + ')">' + i + '</button>';
  }
  h += '<button ' + (data.page >= data.total_pages ? 'disabled' : '') + ' onclick="goAdminPage(' + (data.page+1) + ')">下一页</button>';
  h += '<button ' + (data.page >= data.total_pages ? 'disabled' : '') + ' onclick="goAdminPage(' + data.total_pages + ')">末页</button>';
  h += '<span style="color:#888;font-size:0.8em;margin-left:8px;">共 ' + data.total + ' 条 / ' + data.total_pages + ' 页</span>';
  document.getElementById('pager').innerHTML = h;
}

// Enter key triggers search
document.getElementById('q').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startSearch();
});

function updateSearchMode() {
  var fields = [];
  var locations = [];
  var hasIdentityField = document.getElementById('sc-uid').checked ||
    document.getElementById('sc-post').checked ||
    document.getElementById('sc-name').checked;
  if (document.getElementById('sc-uid').checked) {
    fields.push('用户ID' + (document.getElementById('id-match').value === 'contains' ? '包含' : '精确'));
  }
  if (document.getElementById('sc-post').checked) fields.push('帖子号精确');
  if (document.getElementById('sc-name').checked) {
    fields.push('昵称' + (document.getElementById('name-match').value === 'contains' ? '包含' : '精确'));
  }
  if (document.getElementById('sc-body').checked) locations.push('帖子侧');
  if (document.getElementById('sc-cmt').checked) locations.push('评论侧');
  if (!hasIdentityField) {
    fields.push('文本');
  }
  var mode = fields.join(' + ');
  if (!document.getElementById('sc-post').checked || fields.length > 1) {
    mode += ' · 范围：' + (locations.length ? locations.join('+') : '帖子侧');
  }
  document.getElementById('search-mode').textContent = mode;
  document.getElementById('id-match').classList.toggle('active', document.getElementById('sc-uid').checked);
  document.getElementById('name-match').classList.toggle('active', document.getElementById('sc-name').checked);
}

document.getElementById('sc-uid').addEventListener('change', function() {
  if (this.checked) {
    document.getElementById('sc-name').checked = false;
    document.getElementById('sc-post').checked = false;
  }
  updateSearchMode();
});

document.getElementById('sc-post').addEventListener('change', function() {
  if (this.checked) {
    document.getElementById('sc-uid').checked = false;
    document.getElementById('sc-name').checked = false;
  }
  updateSearchMode();
});

document.getElementById('sc-name').addEventListener('change', function() {
  if (this.checked) {
    document.getElementById('sc-uid').checked = false;
    document.getElementById('sc-post').checked = false;
  }
  updateSearchMode();
});

['sc-body', 'sc-cmt', 'id-match', 'name-match'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', updateSearchMode);
});
['sort', 'date', 'identity'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', startSearch);
});
var categoryTimer = null;
document.getElementById('category').addEventListener('input', function() {
  clearTimeout(categoryTimer);
  categoryTimer = setTimeout(startSearch, 350);
});
updateSearchMode();

fetch('/api/categories')
  .then(parseJsonResponse)
  .then(function(data) {
    var sel = document.getElementById('category-options');
    var counts = data.category_counts || {};
    (data.categories || []).forEach(function(category) {
      var opt = document.createElement('option');
      opt.value = category;
      if (counts[category]) opt.label = category + ' · ' + counts[category];
      sel.appendChild(opt);
    });
  })
  .catch(function() {});

// ── AI Test ──
function aiEscape(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function aiTest() {
  var q = document.getElementById('ai-query').value.trim();
  if (!q) return;
  var btn = document.getElementById('ai-btn');
  var resp = document.getElementById('ai-resp');
  var debug = document.getElementById('ai-debug');
  btn.disabled = true; btn.textContent = '搜索中...';
  resp.classList.remove('active'); debug.classList.remove('active');

  fetch('/api/ai/search', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query: q})
  })
    .then(parseJsonResponse)
    .then(function(d) {
      if (d.ok) {
        var answer = d.answer || {overview: d.summary || '', findings: [], caveat: ''};
        var html = '<div>' + aiEscape(answer.overview || '') + '</div>';
        if (answer.findings && answer.findings.length) {
          html += '<ol class="ai-findings">' + answer.findings.map(function(item) {
            return '<li><strong>' + aiEscape(item.title || '相关发现') + '</strong>：' +
              aiEscape(item.detail || '') + '</li>';
          }).join('') + '</ol>';
        }
        if (answer.caveat) html += '<div class="ai-caveat">说明：' + aiEscape(answer.caveat) + '</div>';
        html += renderAdminAiEvidence(d.evidence_posts || []);
        resp.innerHTML = html;
        resp.classList.add('active');

        if (d._debug) {
          var s = d.evidence_stats || d._debug.evidence_stats || {};
          var dbg = '<strong>⏱ ' + d.elapsed_s + 's · 🔤 in:' + d._debug.tokens_in + ' out:' + d._debug.tokens_out + '</strong><br>';
          dbg += '候选帖子 ' + (s.candidate_posts || 0) +
            ' · 回答上下文 ' + (s.context_posts || 0) +
            ' · 正文命中 ' + (s.body_matched_posts || 0) +
            ' · 评论命中帖子 ' + (s.comment_matched_posts || 0) +
            ' · 相关评论 ' + (s.matched_comments || 0) +
            ' · 实际引用 ' + (s.cited_posts || 0);
          debug.innerHTML = dbg;
          debug.classList.add('active');
        }
      } else {
        resp.innerHTML = '<span style="color:#e94560">' + aiEscape(d.error || 'AI 错误') + '</span>';
        resp.classList.add('active');
      }
    })
    .catch(function(err) {
      resp.innerHTML = '<span style="color:#e94560">网络错误: ' + aiEscape(err.message) + '</span>';
      resp.classList.add('active');
    })
    .finally(function() {
      btn.disabled = false; btn.textContent = 'AI 搜索';
    });
}

function renderAdminAiEvidence(posts) {
  if (!posts.length) return '<div class="ai-caveat">本次回答没有可验证的引用帖子。</div>';
  return '<div class="ai-evidence-list">' + posts.map(function(p) {
    var refs = (p.matched_comments || []).map(function(c) {
      return '<div class="ai-reference"><b>' + aiEscape(c.user_name || '?') + '</b> · ' +
        aiEscape(c.time || '') + '<br>' + aiEscape(c.detail || '') + '</div>';
    }).join('');
    return '<div class="result-row">' +
      '<div class="top"><span><span class="post-cat">' + aiEscape(p.category || '?') +
      '</span> ' + aiEscape(p.user || '?') + ' <span class="meta">#' + aiEscape(p.id) +
      '</span></span><span class="meta">' + aiEscape(p.time || '') + '</span></div>' +
      '<div class="text">' + aiEscape(p.content || '') + '</div>' +
      refs +
      '<div class="stats-row"><span>正文命中 ' + aiEscape((p.body_match_terms || []).join('、') || '无') +
      ' · 相关评论 ' + (p.comment_match_count || 0) + ' 条</span>' +
      '<span class="post-stats-inline"><span>❤ ' + (p.stars || 0) +
      '</span><span>💬 ' + (p.comments || 0) + '</span></span></div></div>';
  }).join('') + '</div>';
}

// Enter key in AI input
document.getElementById('ai-query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); aiTest(); }
});
</script>
</body>
</html>
