<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>架构切换 Demo - SQLite 搜索</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; min-height: 100vh; color: #222; }
.header { background: #8b0012; color: #fff; padding: 20px 16px; text-align: center; position: relative; }
.header h1 { font-size: 1.45em; }
.header p { opacity: .82; margin-top: 4px; font-size: .85em; word-break: break-all; }
.header .home-link { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.78); text-decoration: none; font-size: .9em; }
.header .home-link:hover { color: #fff; }
.search-wrap { max-width: 760px; margin: 16px auto; padding: 0 16px; }
.search-form { display: flex; gap: 8px; }
.search-form input { flex: 1; min-width: 0; padding: 12px 16px; font-size: 16px; border: 2px solid #ddd; border-radius: 12px; outline: none; transition: border-color .2s; }
.search-form input:focus { border-color: #8b0012; }
.search-form button { padding: 0 18px; border: none; border-radius: 12px; background: #8b0012; color: #fff; font-size: 15px; cursor: pointer; }
.sort-bar { max-width: 760px; margin: 0 auto 12px; padding: 0 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sort-bar button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: .85em; color: #666; transition: all .2s; }
.sort-bar button:hover { border-color: #8b0012; color: #8b0012; }
.sort-bar button.active { background: #8b0012; color: #fff; border-color: #8b0012; }
.sort-bar .count-text { margin-left: auto; color: #999; font-size: .8em; }
.results { max-width: 760px; margin: 0 auto; padding: 0 16px; }
.post { background: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.post:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.post .post-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 2px; }
.post .post-header .left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
.post .post-cat { background: #fff0f0; color: #8b0012; padding: 2px 8px; border-radius: 4px; font-size: .78em; white-space: nowrap; }
.post .post-user { color: #333; font-size: .9em; font-weight: 500; }
.post .post-id { color: #bbb; font-size: .78em; white-space: nowrap; }
.post .post-time-right { color: #bbb; font-size: .78em; white-space: nowrap; flex-shrink: 0; }
.post .post-content { line-height: 1.75; color: #222; word-break: break-word; white-space: pre-wrap; margin-top: 6px; }
.post-bottom-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; }
.post-stats-inline { display: flex; gap: 12px; font-size: .82em; color: #999; flex-wrap: wrap; }
.comment-toggle-inline { color: #8b0012; cursor: pointer; font-size: .85em; user-select: none; white-space: nowrap; }
.comment-toggle-inline:hover { text-decoration: underline; }
.comments-wrap { margin-top: 10px; border-left: 3px solid #f0f0f0; padding-left: 14px; }
.cmt { padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: .88em; }
.cmt:last-child { border-bottom: none; }
.cmt-meta { color: #999; font-size: .82em; margin-bottom: 3px; }
.cmt-text { color: #444; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.op-tag { color: #8b0012; font-size: .85em; }
.reply-to { color: #888; }
.replies { margin-left: 14px; border-left: 2px solid #eee; padding-left: 12px; margin-top: 4px; }
.reply { padding: 5px 0; font-size: .95em; }
.no-comments, .demo-updated { color: #aaa; font-size: .78em; margin-top: 8px; }
.empty { text-align: center; color: #999; padding: 60px 20px; background: #fff; border-radius: 12px; }
.empty .icon { font-size: 3em; margin-bottom: 12px; }
.empty .text { font-size: 1em; }
.info { color: #bbb; text-align: center; margin: 30px 0 40px; font-size: .8em; padding: 0 16px; }
.info code { background: #eee; padding: 2px 5px; border-radius: 4px; color: #666; }
.pagination { max-width: 760px; margin: 20px auto; padding: 0 16px; display: flex; justify-content: center; gap: 8px; color: #777; font-size: .9em; }
@media (max-width: 600px) {
  .header { padding: 14px 12px; }
  .header h1 { font-size: 1.2em; }
  .header .home-link { position: static; display: block; transform: none; margin-bottom: 6px; }
  .search-form { flex-direction: column; }
  .search-form button { padding: 11px 18px; }
  .sort-bar .count-text { margin-left: 0; width: 100%; }
}
</style>
</head>
<body>
<div class="header">
  <a class="home-link" href="/">返回主搜索</a>
  <h1>架构切换 Demo</h1>
  <p>SQLite 数据源：__DB_PATH__</p>
</div>

<div class="search-wrap">
  <form class="search-form" method="get" action="/demo">
    <input type="text" name="q" value="__QUERY__" placeholder="搜索 SQLite demo 数据（空格分隔多个词）..." autofocus>
    <input type="hidden" name="sort" id="sort-input" value="__SORT__">
    <button type="submit">搜索</button>
  </form>
</div>

<div class="sort-bar">
  <button class="__SORT_TIME__" onclick="setSort('time')">按时间</button>
  <button class="__SORT_STARS__" onclick="setSort('stars')">按点赞</button>
  <button class="__SORT_VIEWS__" onclick="setSort('views')">按浏览</button>
  <button class="__SORT_HOT__" onclick="setSort('hot')">按热度</button>
  <span class="count-text">共 __TOTAL__ 条结果 · 第 __PAGE__ / __TOTAL_PAGES__ 页</span>
</div>

<div class="results">
  __ROWS__
</div>

<div class="pagination">当前 demo 每页显示 50 条；要查看更多，可扩大导入数量后刷新。</div>

<div class="info">
  数据来自 <code>demo/runtime/posts.demo.db</code>。可用 <code>python demo/architecture_switch_demo.py import-csv --store sqlite --csv-path data/posts_final.csv --limit 500</code> 从真实 CSV 抽样重建。
</div>

<script>
function setSort(sort) {
  document.getElementById('sort-input').value = sort;
  document.querySelector('.search-form').submit();
}
function toggleComments(id, btn) {
  var panel = document.getElementById(id);
  if (!panel) return;
  var open = panel.style.display === 'block';
  panel.style.display = open ? 'none' : 'block';
  if (btn) {
    var count = btn.getAttribute('data-count') || '';
    btn.textContent = open ? '\u25b6 \u5c55\u5f00 ' + count + ' \u6761\u8bc4\u8bba' : '\u25bc \u6536\u8d77\u8bc4\u8bba';
  }
}
</script>
</body>
</html>
